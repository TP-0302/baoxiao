plugins {
    id 'com.android.application'
}

android {
    namespace 'com.baoxiao.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.baoxiao.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.browser:browser:1.7.0'
}
