name: 打包 Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Java 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk-headless
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: 安装 Android SDK
        run: |
          mkdir -p $HOME/Android/cmdline-tools
          cd $HOME/Android/cmdline-tools
          curl -sL -o tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q tools.zip
          mv cmdline-tools latest
          echo "ANDROID_HOME=$HOME/Android" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/Android" >> $GITHUB_ENV
          yes | $HOME/Android/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"

      - name: 安装 Gradle
        run: |
          sudo apt-get install -y -qq gradle

      - name: 构建 APK
        working-directory: android
        run: |
          gradle assembleRelease

      - name: 签名 APK
        run: |
          APK=$(find android -path "*/release/*.apk" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find android -name "*.apk" | head -1)
          fi
          echo "Build APK: $APK"
          keytool -genkey -v -keystore release.keystore \
            -alias baoxiao -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=baoxiao, OU=app, O=baoxiao, L=Shanghai, ST=Shanghai, C=CN"
          $HOME/Android/build-tools/34.0.0/apksigner sign \
            --ks release.keystore --ks-pass pass:android \
            --ks-key-alias baoxiao --key-pass pass:android \
            --out baoxiao-signed.apk "$APK"
          echo "Signed APK created"

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 报销工具-APK
          path: baoxiao-signed.apk

      - name: 上传未签名 APK（备用）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: 报销工具-APK-未签名
          path: "android/**/*.apk"
