name: 打包 Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Java 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk-headless
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: 安装 Android SDK
        run: |
          export ANDROID_HOME=$HOME/Android
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -sL -o tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q tools.zip
          mv cmdline-tools latest
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"

      - name: 下载 Gradle 8.5
        run: |
          curl -sL -o /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.5-bin.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: 生成签名密钥
        run: |
          keytool -genkey -v -keystore release.keystore \
            -alias baoxiao -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=baoxiao, OU=app, O=baoxiao, L=Shanghai, ST=Shanghai, C=CN"

      - name: 构建 APK
        working-directory: android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "=== 项目结构 ==="
          find . -name "*.gradle" -o -name "*.xml" -o -name "*.java" | sort
          echo "=== 开始构建 ==="
          gradle assembleRelease --stacktrace 2>&1

      - name: 签名并上传
        run: |
          APK=$(find android -name "*.apk" -path "*/release/*" | head -1)
          echo "Found APK: $APK"
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks release.keystore --ks-pass pass:android \
            --ks-key-alias baoxiao --key-pass pass:android \
            --out baoxiao.apk "$APK"
          ls -la baoxiao.apk

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 报销工具-APK
          path: baoxiao.apk
