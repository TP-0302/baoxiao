name: 打包 Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 安装 Java 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk-headless
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: 安装 Android SDK 命令行工具
        run: |
          mkdir -p $HOME/Android/cmdline-tools
          cd $HOME/Android/cmdline-tools
          curl -sL -o tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q tools.zip
          mv cmdline-tools latest
          echo "ANDROID_HOME=$HOME/Android" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/Android" >> $GITHUB_ENV
          yes | $HOME/Android/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"

      - name: 安装 Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: 生成签名密钥
        run: |
          keytool -genkey -v -keystore release.keystore \
            -alias baoxiao -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=baoxiao, OU=app, O=baoxiao, L=Shanghai, ST=Shanghai, C=CN"

      - name: 初始化并构建 TWA
        run: |
          bubblewrap init --manifest-url https://tp-0302.github.io/baoxiao/manifest.json --directory twa
          cd twa
          bubblewrap build

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 报销工具-Android-APK
          path: "**/*.apk"
