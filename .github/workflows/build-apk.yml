name: 打包 Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: 生成签名密钥
        run: |
          keytool -genkey -v -keystore release.keystore \
            -alias baoxiao -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=baoxiao, OU=app, O=baoxiao, L=Shanghai, ST=Shanghai, C=CN"

      - name: 初始化并构建 TWA
        run: |
          bubblewrap init --manifest-url https://tp-0302.github.io/baoxiao/manifest.json --directory twa
          cd twa
          bubblewrap build

      - name: 签名 APK
        run: |
          APK=$(find twa -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "APK not found, building manually..."
            cd twa
            ./gradlew assembleRelease
            APK=$(find . -name "*.apk" | head -1)
          fi
          echo "APK found: $APK"
          cp "$APK" ./baoxiao.apk

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 报销工具-Android-APK
          path: "*.apk"
